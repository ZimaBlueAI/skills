<script>
// ============ 主题选择 ============
const THEME = 'terminal'; // terminal | deck（占位符渲染时替换）
if (THEME === 'deck') document.documentElement.classList.add('deck');

// ============ 数据加载 ============
let GRAPH_DATA;
try {
  GRAPH_DATA = JSON.parse(document.getElementById('kg-data').textContent);
} catch (e) {
  console.error('Invalid KG data JSON:', e);
  GRAPH_DATA = { nodes: [], links: [], meta: {} };
}

// 数据合法性
if (!Array.isArray(GRAPH_DATA.nodes)) GRAPH_DATA.nodes = [];
if (!Array.isArray(GRAPH_DATA.links)) GRAPH_DATA.links = [];

// 统计
document.getElementById('stat-nodes').textContent = GRAPH_DATA.nodes.length;
document.getElementById('stat-edges').textContent = GRAPH_DATA.links.length;

// ============ Group 着色 + Legend ============
const GROUP_COLORS_TERMINAL = ['#d4ff00','#44aaff','#ff4444','#44dd88','#ffaa00','#b893ff','#888','#e8e8e8'];
const GROUP_COLORS_DECK     = ['#42e8ff','#6ca5ff','#ffd987','#78f7c5','#ff8c8c','#b893ff','#d8e8f4','#a8bdd5'];
const GROUP_COLORS = THEME === 'deck' ? GROUP_COLORS_DECK : GROUP_COLORS_TERMINAL;

const groupSet = new Map();
GRAPH_DATA.nodes.forEach(n => {
  const g = n.group || 'default';
  groupSet.set(g, (groupSet.get(g) || 0) + 1);
});
const groupArr = [...groupSet.keys()];
document.getElementById('stat-groups').textContent = groupArr.length;

const colorOf = (group) => {
  const i = groupArr.indexOf(group);
  return GROUP_COLORS[i % GROUP_COLORS.length];
};

// ============ 渲染 Legend ============
const mutedGroups = new Set();
const legendEl = document.getElementById('kg-legend');
groupArr.forEach(g => {
  const c = colorOf(g);
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.group = g;
  item.innerHTML = `<span class="swatch" style="background:${c}"></span><span>${g}</span><span class="count">${groupSet.get(g)}</span>`;
  item.addEventListener('click', () => {
    if (mutedGroups.has(g)) {
      mutedGroups.delete(g); item.classList.remove('muted');
    } else {
      mutedGroups.add(g); item.classList.add('muted');
    }
    if (window._graph) {
      window._graph.nodeVisibility(n => !mutedGroups.has(n.group || 'default'));
      window._graph.linkVisibility(l => {
        const s = typeof l.source === 'object' ? l.source : GRAPH_DATA.nodes.find(n => n.id === l.source);
        const t = typeof l.target === 'object' ? l.target : GRAPH_DATA.nodes.find(n => n.id === l.target);
        return s && t && !mutedGroups.has(s.group || 'default') && !mutedGroups.has(t.group || 'default');
      });
    }
  });
  legendEl.appendChild(item);
});

// ============ CDN 加载 + 初始化 ============
const CDN_TIERS = [
  { name: 'jsdelivr', url: 'https://cdn.jsdelivr.net/npm/3d-force-graph@1.74.0/dist/3d-force-graph.min.js' },
  { name: 'unpkg',    url: 'https://unpkg.com/3d-force-graph@1.74.0/dist/3d-force-graph.min.js' },
];

function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url; s.async = true; s.crossOrigin = 'anonymous';
    s.onload = () => resolve(url);
    s.onerror = () => reject(new Error('load failed: ' + url));
    document.head.appendChild(s);
  });
}

async function loadGraphLib() {
  let lastErr;
  for (const tier of CDN_TIERS) {
    try {
      await loadScript(tier.url);
      if (typeof ForceGraph3D !== 'undefined') return tier.name;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('All CDNs failed');
}

const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

(async () => {
  try {
    const tier = await loadGraphLib();
    statusText.textContent = `Rendering · ${tier}`;
    initGraph();
  } catch (e) {
    statusDot.classList.add('fail');
    statusText.textContent = 'CDN load failed — check network';
    console.error(e);
  }
})();

// ============ 主渲染 ============
function initGraph() {
  const container = document.getElementById('kg-canvas');

  // 准备数据：补 link 默认值
  const data = {
    nodes: GRAPH_DATA.nodes.map(n => ({ ...n })),
    links: GRAPH_DATA.links.map(l => ({ ...l, value: l.value || 1 })),
  };

  // 节点 lookup（用于点击时查邻居）
  const nodeById = new Map(data.nodes.map(n => [n.id, n]));

  // 邻接表
  const neighborsOf = new Map();
  data.links.forEach(l => {
    const s = typeof l.source === 'string' ? l.source : l.source.id;
    const t = typeof l.target === 'string' ? l.target : l.target.id;
    if (!neighborsOf.has(s)) neighborsOf.set(s, []);
    if (!neighborsOf.has(t)) neighborsOf.set(t, []);
    neighborsOf.get(s).push({ id: t, type: l.type });
    neighborsOf.get(t).push({ id: s, type: l.type });
  });

  const accent = THEME === 'deck' ? '#42e8ff' : '#d4ff00';
  const edgeColor = THEME === 'deck' ? 'rgba(151,209,255,0.34)' : 'rgba(136,136,136,0.4)';

  let highlightNode = null;
  const highlightNodes = new Set();
  const highlightLinks = new Set();

  const Graph = ForceGraph3D()(container)
    .graphData(data)
    .backgroundColor('rgba(0,0,0,0)')
    .nodeId('id')
    .nodeLabel(n => `<div style="background:rgba(20,20,20,0.92);color:#e8e8e8;padding:6px 10px;border:1px solid #3a3a3a;font-family:monospace;font-size:11px;">${escapeHtml(n.name || n.id)}</div>`)
    .nodeColor(n => {
      if (highlightNodes.size > 0 && !highlightNodes.has(n.id)) return THEME === 'deck' ? '#1a2a3a' : '#2a2a2a';
      return colorOf(n.group || 'default');
    })
    .nodeVal(n => n.size || 4)
    .nodeOpacity(0.92)
    .linkColor(l => {
      const id = (typeof l.source === 'object' ? l.source.id : l.source) + '→' + (typeof l.target === 'object' ? l.target.id : l.target);
      if (highlightLinks.size > 0 && !highlightLinks.has(id)) return 'rgba(80,80,80,0.08)';
      return edgeColor;
    })
    .linkOpacity(0.45)
    .linkWidth(l => highlightLinks.has((typeof l.source === 'object' ? l.source.id : l.source) + '→' + (typeof l.target === 'object' ? l.target.id : l.target)) ? 2 : 0.5)
    .linkDirectionalParticles(l => highlightLinks.has((typeof l.source === 'object' ? l.source.id : l.source) + '→' + (typeof l.target === 'object' ? l.target.id : l.target)) ? 3 : 0)
    .linkDirectionalParticleSpeed(0.006)
    .linkDirectionalParticleColor(() => accent)
    .onNodeClick(node => {
      showDetail(node);
      // 高亮邻居
      highlightNodes.clear();
      highlightLinks.clear();
      highlightNodes.add(node.id);
      (neighborsOf.get(node.id) || []).forEach(nb => {
        highlightNodes.add(nb.id);
        highlightLinks.add(node.id + '→' + nb.id);
        highlightLinks.add(nb.id + '→' + node.id);
      });
      Graph.refresh();
      // 镜头聚焦
      const dist = 80;
      const distRatio = 1 + dist / Math.hypot(node.x, node.y, node.z);
      Graph.cameraPosition(
        { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
        node, 1500
      );
    })
    .onBackgroundClick(() => {
      highlightNodes.clear();
      highlightLinks.clear();
      hideDetail();
      Graph.refresh();
    })
    .onEngineStop(() => {
      statusDot.classList.add('ok');
      statusText.textContent = `${data.nodes.length} nodes · stable`;
    });

  // 力学参数
  Graph.d3Force('charge').strength(-180);
  Graph.d3Force('link').distance(40);

  window._graph = Graph;

  // ============ 控件 ============
  document.getElementById('btn-fit').onclick = () => Graph.zoomToFit(800, 50);
  let paused = false;
  document.getElementById('btn-pause').onclick = (e) => {
    paused = !paused;
    if (paused) Graph.pauseAnimation();
    else Graph.resumeAnimation();
    e.target.classList.toggle('active', paused);
    e.target.textContent = paused ? 'RESUME' : 'PAUSE';
  };
  document.getElementById('btn-reset').onclick = () => {
    highlightNodes.clear(); highlightLinks.clear();
    hideDetail();
    Graph.refresh();
    Graph.zoomToFit(800, 50);
  };

  // 搜索
  const searchEl = document.getElementById('kg-search');
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) {
      highlightNodes.clear(); highlightLinks.clear();
      Graph.refresh();
      return;
    }
    highlightNodes.clear();
    data.nodes.forEach(n => {
      if ((n.name || '').toLowerCase().includes(q) || (n.id || '').toLowerCase().includes(q)) {
        highlightNodes.add(n.id);
      }
    });
    Graph.refresh();
  });

  // ============ 详情面板 ============
  function showDetail(node) {
    document.getElementById('detail-id').textContent = `${node.group || 'default'} · ${node.id}`;
    document.getElementById('detail-name').textContent = node.name || node.id;
    document.getElementById('detail-desc').textContent = node.desc || '';
    const list = document.getElementById('detail-neighbors');
    const nbs = neighborsOf.get(node.id) || [];
    document.getElementById('detail-link-count').textContent = nbs.length;
    list.innerHTML = '';
    nbs.slice(0, 30).forEach(nb => {
      const target = nodeById.get(nb.id);
      if (!target) return;
      const li = document.createElement('li');
      li.innerHTML = `<span style="color:${colorOf(target.group || 'default')}">●</span> ${escapeHtml(target.name || target.id)}${nb.type ? ' <span style="color:var(--fg-faint)">' + escapeHtml(nb.type) + '</span>' : ''}`;
      li.onclick = () => Graph.cameraPosition({ x: target.x * 1.5, y: target.y * 1.5, z: target.z * 1.5 }, target, 1000);
      list.appendChild(li);
    });
    if (nbs.length > 30) {
      const li = document.createElement('li');
      li.innerHTML = `<span style="color:var(--fg-dim)">… +${nbs.length - 30} more</span>`;
      li.style.cursor = 'default';
      list.appendChild(li);
    }
    document.getElementById('kg-detail').classList.add('visible');
  }
  function hideDetail() { document.getElementById('kg-detail').classList.remove('visible'); }
  document.getElementById('kg-detail-close').onclick = hideDetail;

  // 初次 fit
  setTimeout(() => Graph.zoomToFit(800, 50), 1200);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
