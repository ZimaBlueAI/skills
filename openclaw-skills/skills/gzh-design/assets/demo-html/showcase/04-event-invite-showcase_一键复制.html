<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>活动邀请场景模板 - 公众号排版预览</title>
<style>
  body{margin:0;background:#eef0f2;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;-webkit-text-size-adjust:100%;}
  .gzh-toolbar{position:fixed;top:0;left:0;right:0;min-height:56px;background:#fff;box-shadow:0 1px 12px rgba(15,23,42,.12);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 16px;z-index:99;box-sizing:border-box;}
  .gzh-hint{font-size:13px;color:#64748b;line-height:1.45;}
  .gzh-hint b{color:#0f172a;}
  .gzh-copy{background:#059669;color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(5,150,105,.28);white-space:nowrap;}
  .gzh-copy:hover{background:#047857;}
  .gzh-copy:active{transform:translateY(1px);}
  .gzh-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88vw;text-align:center;}
  .gzh-toast.show{opacity:1;}
  .gzh-stage{max-width:700px;margin:84px auto 64px;padding:0 8px;}
  @media(max-width:560px){.gzh-toolbar{align-items:flex-start;flex-direction:column}.gzh-copy{width:100%}.gzh-stage{margin-top:118px}}
</style>
</head>
<body>
<div class="gzh-toolbar">
  <span class="gzh-hint">下方是排版效果。点击 <b>一键复制</b> 后，到微信公众号编辑器直接粘贴。</span>
  <button class="gzh-copy" id="gzhCopyBtn" onclick="gzhCopy()">一键复制</button>
</div>
<div class="gzh-toast" id="gzhToast"></div>
<div class="gzh-stage">
  <div id="gzh-content">
<section style="max-width:677px;margin:0 auto;padding:0 12px;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;">
<section style="margin:0 0 24px;padding:28px 22px;border-radius:20px;background:#FFFBEB;border:1px solid #E5E7EB;"><span style="display:inline-block;padding:4px 9px;border-radius:999px;background:#FFFFFF;color:#B45309;font-size:12px;font-weight:800;margin:0 6px 8px 0;"><span leaf="">EDITORIAL</span></span><h1 style="margin:4px 0 14px;font-size:25px;line-height:1.35;color:#0F172A;font-weight:900;"><span leaf="">一间城市小书店的周末活动邀请</span></h1><p style="margin:0;font-size:15px;line-height:1.9;color:#57534E;font-weight:500;"><span leaf="">适合活动邀请、品牌故事、文化空间、生活方式内容。</span></p></section>
<section style="margin:18px 0;padding:18px 18px;border-radius:16px;background:#FEF3C7;border-left:5px solid #B45309;"><p style="margin:0;font-size:16px;line-height:1.9;color:#1F2937;font-weight:800;"><span leaf="">这个周末，我们想把一小时留给纸页、咖啡和一段慢下来的谈话。</span></p></section>
<section style="margin:10px 0;padding:15px 16px;border-radius:14px;background:#FFFFFF;border:1px solid #E5E7EB;"><p style="margin:0 0 8px;font-size:14px;line-height:1.7;color:#B45309;font-weight:900;"><span style="display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:8px;background:#B45309;color:#FFFFFF;margin-right:8px;"><span leaf="">时</span></span><span leaf="">时间</span></p><p style="margin:0;font-size:14px;line-height:1.85;color:#475569;font-weight:400;"><span leaf="">周六 15:00-17:00，提前 10 分钟入场。</span></p></section>
<section style="margin:10px 0;padding:15px 16px;border-radius:14px;background:#FFFBEB;border:1px solid #E5E7EB;"><p style="margin:0 0 8px;font-size:14px;line-height:1.7;color:#B45309;font-weight:900;"><span style="display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:8px;background:#B45309;color:#FFFFFF;margin-right:8px;"><span leaf="">地</span></span><span leaf="">地点</span></p><p style="margin:0;font-size:14px;line-height:1.85;color:#475569;font-weight:400;"><span leaf="">梧桐街 18 号二楼，小书店后厅。</span></p></section>
<section style="margin:10px 0;padding:15px 16px;border-radius:14px;background:#FFFFFF;border:1px solid #E5E7EB;"><p style="margin:0 0 8px;font-size:14px;line-height:1.7;color:#B45309;font-weight:900;"><span style="display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:8px;background:#B45309;color:#FFFFFF;margin-right:8px;"><span leaf="">票</span></span><span leaf="">名额</span></p><p style="margin:0;font-size:14px;line-height:1.85;color:#475569;font-weight:400;"><span leaf="">现场 24 席，报名成功后保留座位。</span></p></section>
<section style="margin:26px 0 0;padding:20px;border-radius:18px;background:#0F172A;"><p style="margin:0 0 8px;font-size:17px;line-height:1.7;color:#FFFFFF;font-weight:900;"><span leaf="">预约一个座位</span></p><p style="margin:0;font-size:14px;line-height:1.8;color:#CBD5E1;font-weight:400;"><span leaf="">带一本最近读过的书，也可以只带一个问题来。</span></p><p style="margin:14px 0 0;font-size:14px;line-height:1.7;color:#FFFFFF;font-weight:900;"><span style="display:inline-block;padding:8px 13px;border-radius:999px;background:#B45309;color:#FFFFFF;"><span leaf="">立即行动</span></span></p></section>
<section style="margin:28px 0 0;padding:18px;border-radius:14px;background:#F9FAFB;border:1px solid #E5E7EB;"><p style="margin:0;font-size:14px;line-height:1.9;color:#475569;font-weight:400;"><span leaf="">我是 {{作者名}}，{{一句话简介}}。如果这篇文章对你有帮助，欢迎点赞、在看、转发。</span></p></section></section>
  </div>
</div>
<script>
  function gzhShowToast(msg){
    var t=document.getElementById("gzhToast");
    t.textContent=msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer=setTimeout(function(){t.classList.remove("show");},2600);
  }
  function gzhPlainText(el){
    return el.innerText || el.textContent || "";
  }
  async function gzhCopy(){
    var el=document.getElementById("gzh-content");
    var btn=document.getElementById("gzhCopyBtn");
    var old=btn.textContent;
    var html=el.innerHTML.trim();
    var copied=false;

    if(navigator.clipboard && window.ClipboardItem){
      try{
        var item=new ClipboardItem({
          "text/html": new Blob([html], {type:"text/html"}),
          "text/plain": new Blob([gzhPlainText(el)], {type:"text/plain"})
        });
        await navigator.clipboard.write([item]);
        copied=true;
      }catch(e){copied=false;}
    }

    if(!copied){
      var range=document.createRange();
      range.selectNodeContents(el);
      var sel=window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      try{copied=document.execCommand("copy");}catch(e){copied=false;}
      sel.removeAllRanges();
    }

    if(copied){
      btn.textContent="已复制";
      gzhShowToast("已复制。到微信公众号编辑器按 Ctrl/⌘+V 粘贴。");
      setTimeout(function(){btn.textContent=old;},2200);
    }else{
      gzhShowToast("自动复制失败，请手动选中正文后复制。");
    }
  }
</script>
</body>
</html>
